<!DOCTYPE html>
<html>
  <head>
    {% if page.title%}
    	<title>{{page.title}}</title>
    {% else %}
    	<title>Untitled post</title>
    {% endif %}
    <link rel="stylesheet" type="text/css" href="/assets/style.css" />
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>
  <body>
    {{ page.date | date: "%b %d, %Y" }}
    {{ content }}
  </body>
</html>
